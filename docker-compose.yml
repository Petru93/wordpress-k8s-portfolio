#version: "3.9"

# ============================================================
# Named volumes — data persists across container restarts
# ============================================================
volumes:
  db_data:
  wordpress_data:

# ============================================================
# Isolated network — containers talk by service name
# ============================================================
networks:
  wordpress_net:
    driver: bridge

services:

  # ----------------------------------------------------------
  # Database — MySQL 8
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: wp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wordpress_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # WordPress — your custom built image
  # ----------------------------------------------------------
  wordpress:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: wp_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - wordpress_data:/var/www/html/wp-content
    networks:
      - wordpress_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------
  # Reverse proxy — Nginx routes external traffic in
  # ----------------------------------------------------------
  proxy:
    image: nginx:alpine
    container_name: wp_proxy
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./docker/config/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wordpress_net