{{- if .Values.wordpress.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wordpress.fullname" . }}-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.wordpress.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.wordpress.ingress.className }}
  rules:
    - host: {{ .Values.wordpress.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "wordpress.fullname" . }}-svc
                port:
                  number: {{ .Values.wordpress.service.port }}
{{- end }}